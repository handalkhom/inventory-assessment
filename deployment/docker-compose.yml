version: '3.8'

services:
  app:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    image: inventory-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_public:/var/www/html/public
      - app_storage:/var/www/html/storage
    env_file:
      - .env.docker
    networks:
      - inventory_network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - app
    volumes:
      - app_public:/var/www/html/public
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - inventory_network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: inventory_assessment
      MYSQL_ROOT_PASSWORD: secret_root_password
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network

  redis:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network

  worker:
    image: inventory-app
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage
    env_file:
      - .env.docker
    networks:
      - inventory_network

volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_public:

networks:
  inventory_network:
    driver: bridge
